name: Dasha Bot — LOCAL-FIRST v1.0 — Даша Дизайнер Мебели

# ═══════════════════════════════════════════════════════════════════════════
# Dasha Bot v1.0 — LOCAL-FIRST RuadaptQwen3-4B + CLOUD FAILOVER
#
#   - LOCAL MODEL: RuadaptQwen3-4B-Instruct Q4_K_M (~2.5GB GGUF, CPU)
#   - Russian-optimized tokenizer
#   - LOCAL-FIRST for chat/comments (saves cloud balance!)
#   - Pollinations AI as cloud fallback
#   - Model caching via actions/cache@v4
#   - HF_TOKEN for authenticated HuggingFace download
#   - libopenblas-dev for fast CPU inference
#
# Schedule (UTC, Krasnoyarsk = UTC+7, Moscow = UTC+3):
#   Every 5 hours: 00:00, 05:00, 10:00, 15:00, 20:00
# ═══════════════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 0 * * *'      # 00:00 UTC = 07:00 Krasnoyarsk
    - cron: '0 5 * * *'      # 05:00 UTC = 12:00 Krasnoyarsk
    - cron: '0 10 * * *'     # 10:00 UTC = 17:00 Krasnoyarsk
    - cron: '0 15 * * *'     # 15:00 UTC = 22:00 Krasnoyarsk
    - cron: '0 20 * * *'     # 20:00 UTC = 03:00 Krasnoyarsk
  workflow_dispatch:

# ═══ CRITICAL: Single concurrency group ═══
concurrency:
  group: dasha-bot-single
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345  # ~5h45m

    steps:
      # ── Kill conflicting runs ──
      - name: Cancel conflicting runs and wait
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          echo "=== Checking for other running bot instances ==="
          CURRENT_RUN=${{ github.run_id }}
          REPO=${{ github.repository }}

          for status in in_progress queued; do
            RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs?status=$status&per_page=10" \
              | python3 -c '
          import sys, json
          try:
              d = json.load(sys.stdin)
              for r in d.get("workflow_runs", []):
                  if r["id"] != int(sys.argv[1]):
                      print(r["id"])
          except: pass
          ' "$CURRENT_RUN")

            for run_id in $RUNS; do
              echo "Cancelling $status run: $run_id"
              curl -s -X POST -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/runs/$run_id/cancel" || true
            done
          done

          echo "Waiting 60s for old bot instances to fully stop..."
          sleep 60
          echo "=== Ready to start ==="

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          sudo apt-get update -qq && sudo apt-get install -y -qq libopenblas-dev
          CMAKE_ARGS="-DGGML_BLAS=ON -DGGML_BLAS_VENDOR=OpenBLAS" pip install 'llama-cpp-python>=0.3.0' --no-cache-dir
          pip install -r requirements.txt

      - name: Clean Python cache
        run: |
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          rm -f '=0.3.0'
          echo "Python cache cleaned"

      - name: Create data directory
        run: mkdir -p data models

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/dasha_bot.db
          key: dasha-bot-db-v1
          restore-keys: |
            dasha-bot-db-

      - name: Cache local model
        uses: actions/cache@v4
        with:
          path: models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
          key: ruadapt-qwen3-4b-instruct-q4km-dasha-v1
          restore-keys: |
            qwen3-4b-
            ruadapt-qwen3-4b-

      - name: Download local model (if not cached)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p models
          if [ -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            SIZE=$(stat -c%s "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" 2>/dev/null || echo 0)
            SIZE_MB=$((SIZE / 1048576))
            echo "Model file found in cache: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "Cached file too small, removing..."
              rm -f models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
            fi
          fi

          if [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            echo "Downloading RuadaptQwen3-4B-Instruct Q4_K_M (~2.3GB)..."
            if [ -n "$HF_TOKEN" ]; then
              echo "Using HF_TOKEN for authenticated download"
              pip install -q huggingface_hub
              huggingface-cli download RefalMachine/RuadaptQwen3-4B-Instruct-GGUF Q4_K_M.gguf --local-dir models --token "$HF_TOKEN" || true
              if [ -f "models/Q4_K_M.gguf" ] && [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
                mv models/Q4_K_M.gguf models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
              fi
              if [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
                echo "HF hub download failed, trying direct URL..."
                curl -L --retry 3 --max-time 600 \
                  -H "Authorization: Bearer $HF_TOKEN" \
                  -o models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf \
                  "https://huggingface.co/RefalMachine/RuadaptQwen3-4B-Instruct-GGUF/resolve/main/Q4_K_M.gguf" || true
              fi
              if [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
                echo "Authenticated download failed, trying unauthenticated..."
                curl -L --retry 3 --max-time 600 \
                  -o models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf \
                  "https://huggingface.co/RefalMachine/RuadaptQwen3-4B-Instruct-GGUF/resolve/main/Q4_K_M.gguf" || true
              fi
            else
              echo "No HF_TOKEN set, trying unauthenticated download..."
              curl -L --retry 3 --max-time 600 \
                -o models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf \
                "https://huggingface.co/RefalMachine/RuadaptQwen3-4B-Instruct-GGUF/resolve/main/Q4_K_M.gguf" || true
            fi
          fi

          if [ -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            SIZE=$(stat -c%s "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" 2>/dev/null || echo 0)
            SIZE_MB=$((SIZE / 1048576))
            echo "Model file: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "ERROR: Model file too small (${SIZE_MB} MB), likely corrupted!"
              rm -f models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
              echo "ENABLE_LOCAL_MODEL=false" >> $GITHUB_ENV
            else
              echo "Model downloaded successfully!"
            fi
          else
            echo "WARNING: Model download failed, running in cloud-only mode"
            echo "ENABLE_LOCAL_MODEL=false" >> $GITHUB_ENV
          fi

      - name: Ensure .gitignore allows database
        run: |
          if [ -f .gitignore ]; then
            sed -i '/dasha_bot\.db/d' .gitignore
          fi

      # ── Run the Bot — UNLIMITED AUTO-RESTART ──
      - name: Run Dasha Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
          PHONE: ${{ secrets.PHONE }}
          # Pollinations AI — fallback
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          # GitHub PAT for self-dispatch
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GH_REPO: abakanmebel9-jpg/asdasha
          # Local model
          ENABLE_LOCAL_MODEL: ${{ env.ENABLE_LOCAL_MODEL || 'true' }}
          MODEL_PATH: "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf"
          MODEL_N_CTX: "8192"
          MODEL_N_THREADS: "3"
          MODEL_MAX_TOKENS: "1024"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Database
          DB_PATH: data/dasha_bot.db
          LOG_LEVEL: INFO
          # Schedule settings — 1 post per hour
          NEWS_INTERVAL_MINUTES: "30"
          CHANNEL_POST_INTERVAL_MINUTES: "60"
        run: |
          echo "=== Starting Dasha Bot v1.0 — LOCAL-FIRST ==="
          echo "LOCAL MODEL: RuadaptQwen3-4B-Instruct Q4_K_M (PRIMARY)"
          echo "CLOUD: Pollinations (fallback)"
          echo "CHANNEL: @abakan_mebel (1 post/hour)"
          echo "NEWS: furniture-news.json from abakanmebel9-jpg/par"
          echo "=== Launching bot with UNLIMITED auto-restart ==="

          RETRY=0
          while true; do
            RETRY=$((RETRY+1))
            echo "--- Attempt $RETRY ---"

            python3 -m bot.main
            EXIT_CODE=$?
            echo "Bot exited with code $EXIT_CODE (attempt $RETRY)"

            if [ $EXIT_CODE -eq 2 ]; then
              echo "Persistent conflicts — restarting in 10s..."
              sleep 10
            elif [ $EXIT_CODE -eq 3 ]; then
              echo "Health check failure — restarting in 20s..."
              sleep 20
            elif [ $EXIT_CODE -eq 0 ]; then
              echo "Session timeout — restarting in 5s..."
              sleep 5
            else
              if [ $RETRY -le 3 ]; then
                SLEEP=10
              elif [ $RETRY -le 6 ]; then
                SLEEP=15
              else
                SLEEP=30
              fi
              echo "Bot crashed (code $EXIT_CODE) — restarting in ${SLEEP}s..."
              sleep $SLEEP
            fi
          done

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/dasha_bot.db
          key: dasha-bot-db-v1-${{ github.run_id }}

      - name: Save database to git
        if: always()
        run: |
          if [ -f data/dasha_bot.db ]; then
            git config user.name "Dasha Bot"
            git config user.email "dasha-bot@users.noreply.github.com"
            rm -f '=0.3.0'
            git add -f data/dasha_bot.db || true
            git diff --staged --quiet || git commit -m "db: update $(date +%Y-%m-%d_%H:%M)" || true
            git add -A || true
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true
            git push || true
          fi

      # ── Self-dispatch for 24/7 ──
      - name: Re-dispatch workflow for continuous operation
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          echo "=== Re-dispatching workflow for 24/7 uptime ==="
          REPO=${{ github.repository }}
          sleep 10
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/bot.yml/dispatches" \
              -d '{"ref":"main"}')
            if [ "$HTTP_CODE" = "204" ]; then
              echo "Workflow re-dispatched successfully (attempt $i)"
              break
            fi
            echo "Re-dispatch attempt $i failed (HTTP $HTTP_CODE), retrying in 10s..."
            sleep 10
          done
          echo "=== Re-dispatch complete ==="

      - name: Cleanup
        if: always()
        run: |
          echo "=== Bot session ended ==="